services:
  - type: web
    name: blog-backend
    env: node
    buildCommand: cd backend && npm install && npm run db:init
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: blog-db
          property: connectionString
      - key: KEY_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.onrender.com
      - key: PORT
        value: 3000

  - type: web
    name: blog-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: blog-db
    plan: free